<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Posts</title>
    <style>


.post-list-item {
    width: 400px;
    border-radius: 10px;
    top: 17%;
    left: 38%;
    list-style: none;
	border: 2px solid darkred;
	padding: 20px;
    background: cadetblue;
}


h2 {
	margin: 40px;
    font-size: 40px;
}
.comment-list-item {
    border: 1px solid;
    background: antiquewhite;
    border-radius: 10px;
    margin-bottom: 20px;
}

.comment-container {
    margin: 20px 20px 20px 20px;
   
}

.post-container {
    position: relative;
}

.post-list-item {
    position: relative;
}
.comment-title{
    margin-left: 20px;
}

.container-comment {
    margin-top: 80px;
}
    </style>
</head>

<body>
    <h2>Post Details</h2>
    <div class="main-container">
          <div id="post-container" class="post-container"></div>
          <div class="container-comment">
            <h3 class="comment-title">Comments</h3>
            <div id="comment-container" class="comment-container"></div>
            <h3 class="comment-title">New from main</h3>
          </div>
       
    </div>
